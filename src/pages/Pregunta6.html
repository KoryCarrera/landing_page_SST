<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pregunta 5 - Trivia Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#22c55e",
              "brand-strong": "#16a34a",
              "brand-softer": "#f0fdf4",
              "brand-subtle": "#dcfce7",
            },
            borderRadius: { base: "1rem" },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ["Lora", "serif"],
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 24px 24px;
      }
      .title-font {
        font-family: "Lora", serif;
      }
      .shimmer-card {
        position: relative;
        overflow: hidden;
      }
      .shimmer-card::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -100%;
        width: 50%;
        height: 200%;
        background: linear-gradient(
          105deg,
          transparent 20%,
          rgba(255, 255, 255, 0.7) 50%,
          transparent 80%
        );
        transform: skewX(-20deg);
        transition: left 0.7s ease;
        pointer-events: none;
      }
      .group:hover .shimmer-card::after {
        left: 150%;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8"
  >
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[-1]">
      <div
        class="absolute -top-[20%] -left-[10%] w-[70%] h-[70%] rounded-full bg-green-200/30 blur-3xl"
      ></div>
      <div
        class="absolute bottom-0 right-0 w-[60%] h-[60%] rounded-full bg-emerald-200/20 blur-3xl"
      ></div>
    </div>

    <header class="w-full max-w-2xl text-center mb-8 sm:mb-12 relative z-10">
      <h1
        class="title-font text-4xl sm:text-5xl text-brand-strong font-semibold tracking-tight mb-3 flex justify-center items-center gap-2"
      >
        Trivia <em class="text-brand not-italic">Challenge</em>
      </h1>
      <div
        class="h-1 w-24 bg-gradient-to-r from-green-300 via-brand to-emerald-400 mx-auto rounded-full mb-4 opacity-80"
      ></div>
      <p class="text-gray-600 text-sm sm:text-base max-w-md mx-auto">
        Demuestra lo que sabes sobre Seguridad y Salud en el Trabajo.
      </p>
    </header>

    <main class="w-full max-w-xl mx-auto relative group z-10">
      <div
        class="absolute -inset-1 bg-gradient-to-r from-green-400 to-emerald-500 rounded-3xl blur opacity-30 group-hover:opacity-60 transition duration-700"
      ></div>
      <div
        class="shimmer-card relative bg-white/95 backdrop-blur-sm border border-brand-subtle rounded-3xl shadow-xl overflow-hidden"
      >
        <div
          class="relative bg-gradient-to-br from-brand-softer to-brand-subtle px-6 py-8 sm:px-8 border-b border-green-100/50 overflow-hidden"
        >
          <div
            class="absolute -top-10 -right-10 w-32 h-32 bg-brand/10 rounded-full blur-xl"
          ></div>
          <div class="relative z-10">
            <span
              class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-white border border-brand/20 text-brand-strong text-xs font-bold tracking-wider uppercase mb-3 shadow-sm"
            >
              <svg
                class="w-3.5 h-3.5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
              Pregunta 6
            </span>
            <h2
              id="question6"
              class="title-font text-xl sm:text-2xl text-gray-800 font-medium leading-snug"
            >
            </h2>
          </div>
        </div>

        <div class="p-6 sm:p-8">
          <div class="relative">
            <input
              type="text"
              id="answer"
              name="answer"
              placeholder="Escribe tu respuesta aquí..."
              class="w-full px-5 py-4 text-gray-700 bg-white border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-brand focus:ring-4 focus:ring-brand-subtle transition-all duration-300 text-lg placeholder:text-slate-400 shadow-sm"
              autocomplete="off"
            />
          </div>
          <p class="mt-3 text-sm text-slate-500 flex items-center gap-1.5 ml-1">
            <svg
              class="w-4 h-4 text-brand/70"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              ></path>
            </svg>
            Escribe una palabra clave.
          </p>
        </div>

        <div
          class="bg-slate-50 border-t border-slate-100 px-6 py-4 sm:px-8 sm:py-5 flex flex-col sm:flex-row items-center justify-between gap-4"
        >
          <div
            class="flex items-center gap-2 text-sm text-gray-500 font-medium bg-white px-3 py-1.5 rounded-full shadow-sm border border-slate-200"
          >
            <svg
              class="w-4 h-4 text-emerald-500"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            <span>Tiempo estimado: 30s</span>
          </div>

          <button
            id="next"
            class="w-full sm:w-auto px-8 py-3 bg-brand hover:bg-brand-strong text-white font-semibold rounded-xl shadow-lg shadow-brand/30 transform transition-all hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-brand-subtle flex items-center justify-center gap-2 group/btn"
          >
            Siguiente
            <svg
              class="w-5 h-5 group-hover/btn:translate-x-1 transition-transform"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M14 5l7 7m0 0l-7 7m7-7H3"
              />
            </svg>
          </button>
        </div>
      </div>
    </main>

    <footer class="mt-8 sm:mt-12 flex justify-center gap-2 z-10">
      <div class="w-2 h-2 bg-gray-300 rounded-full"></div>
      <div class="w-2 h-2 bg-gray-300 rounded-full"></div>
      <div class="w-2 h-2 bg-gray-300 rounded-full"></div>
      <div class="w-2 h-2 bg-gray-300 rounded-full"></div>
      <div class="w-8 h-2 bg-brand rounded-full"></div>
      <div class="w-2 h-2 bg-gray-300 rounded-full"></div>
      <div class="w-2 h-2 bg-gray-300 rounded-full"></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../app.js"></script>
    <script src="../js/page6.js"></script>

  </body>
</html>
